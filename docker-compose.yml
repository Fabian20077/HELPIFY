services:
  helpdesk-db-dev:
    image: mysql:8.0
    container_name: helpdesk-db-dev
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: helpdesk_dev
      MYSQL_USER: helpdesk
      MYSQL_PASSWORD: helpdesk123
    ports:
      - "3306:3306"
    volumes:
      - db_dev_data:/var/lib/mysql

  helpdesk-db-test:
    image: mysql:8.0
    container_name: helpdesk-db-test
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: helpdesk_test
      MYSQL_USER: helpdesk
      MYSQL_PASSWORD: helpdesk123
    ports:
      - "3307:3306"
    volumes:
      - db_test_data:/var/lib/mysql

volumes:
  db_dev_data:
  db_test_data:
